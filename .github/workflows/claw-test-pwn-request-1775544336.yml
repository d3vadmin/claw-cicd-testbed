name: claw-cicd-test
on:
  pull_request_target:
    types: [opened]
permissions:
  contents: write
jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
              - uses: pnpm/action-setup@v4
              - uses: actions/setup-node@v4
                with:
                  node-version: 20
- name: install-and-build
  run: pnpm install 2>/dev/null || npm ci 2>/dev/null || true; if [ -f Makefile ]; then make; fi
